<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f5f2ed" />
    <title>暂时离线 · 合租订阅</title>
    <link rel="icon" href="/icon-192.png" />
    <style>
      :root { color-scheme: light; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      * { box-sizing: border-box; }
      body {
        min-height: 100dvh;
        margin: 0;
        padding: max(24px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
        display: grid;
        place-items: center;
        color: #1c1917;
        background:
          radial-gradient(720px 420px at 82% -8%, rgba(249, 115, 22, 0.18), transparent 62%),
          radial-gradient(640px 440px at -10% 80%, rgba(14, 165, 233, 0.1), transparent 62%),
          #f5f2ed;
      }
      main {
        width: min(100%, 360px);
        padding: 28px;
        text-align: center;
        border: 1px solid rgba(255, 255, 255, 0.8);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.72);
        box-shadow: 0 18px 60px rgba(28, 25, 23, 0.09), inset 0 1px 0 rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(24px) saturate(160%);
      }
      img { width: 72px; height: 72px; border-radius: 20px; box-shadow: 0 10px 28px rgba(234, 88, 12, 0.2); }
      h1 { margin: 20px 0 0; font-size: 24px; letter-spacing: -0.03em; }
      p { margin: 10px 0 0; color: #78716c; font-size: 14px; line-height: 1.65; }
      button {
        margin-top: 22px;
        border: 0;
        border-radius: 999px;
        padding: 11px 20px;
        color: white;
        background: #ea580c;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        box-shadow: 0 9px 22px rgba(234, 88, 12, 0.24);
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/icon-192.png" alt="合租订阅" />
      <h1>当前网络不可用</h1>
      <p>已保存的页面仍可查看；新增、编辑和标记已付需要恢复网络后再操作。</p>
      <button type="button" onclick="location.reload()">重新连接</button>
    </main>
  </body>
</html>
